<!DOCTYPE html>
<html>
<head>
    <title>Approval List</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 40px;
        }

        .container {
            max-width: 900px;
            margin: auto;
        }

        .header {
            background: #2563eb;
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .empty {
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            color: #666;
        }
    </style>
</head>
<body>

<div class="container">

    <div class="header">
        <h1>Approval Workflow</h1>
        <p>VendorBridge Procurement System</p>
    </div>

    {% for approval in approvals %}
        <div class="card">
            <strong>{{ approval }}</strong>
        </div>
    {% empty %}
        <div class="empty">
            <h3>No approvals found</h3>
            <p>Create an approval record from Django Admin.</p>
        </div>
    {% endfor %}

</div>

</body>
</html>

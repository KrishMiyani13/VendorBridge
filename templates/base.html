<!DOCTYPE html>
<html lang="en">
<head>

    <title>VendorBridge ERP</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f7fa;
        }

        .navbar {
            background: #0d6efd;
        }

        .card {

            border-radius: 15px;
            box-shadow: 0px 2px 10px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="#">
            VendorBridge ERP
        </a>
        <div>
            <a href="/vendors/" class="btn btn-light btn-sm">
                Vendors
            </a>
            <a href="/rfq/" class="btn btn-light btn-sm">
                RFQ
            </a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>

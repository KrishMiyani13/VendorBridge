<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<div style="width: 700px; height: 400px;">
    <canvas id="myChart"></canvas>
</div>

<script>
const ctx = document.getElementById('myChart').getContext('2d');

new Chart(ctx, {
    type: 'bar',
    data: {
        labels: [
            'Vendors',
            'PO',
            'Invoices'
        ],
        datasets: [{
            label: 'VendorBridge Analytics',
            data: [
                {{ vendors|default:0 }},
                {{ purchase_orders|default:0 }},
                {{ invoices|default:0 }}
            ],
            borderWidth: 1
        }]
    },
    options: {
        responsive: true,
        scales: {
            y: {
                beginAtZero: true
            }
        }
    }
});
</script>
